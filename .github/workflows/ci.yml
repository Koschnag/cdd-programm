name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  programm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 9.0.x }
      - name: CDD auschecken
        uses: actions/checkout@v4
        with: { repository: Koschnag/cong-driven-development, ref: v0.3.0, path: .cdd }
      - name: Säulen auschecken (für Aggregation)
        run: |
          for r in runenruf cdd-fallstudie; do
            git clone --depth 1 https://github.com/Koschnag/$r.git ../$r || true
          done
          ln -sfn "$GITHUB_WORKSPACE/.cdd" ../cong-driven-development || true
      - name: SPOT validieren
        run: dotnet run --project .cdd/src/Cdd.Cli -- validate
      - name: Programm-Dashboard generieren
        run: dotnet fsi scripts/programm-status.fsx ..
      - name: Tests
        run: dotnet test tests/Programm.Tests --nologo
      - name: STATUS.md als Artefakt
        uses: actions/upload-artifact@v4
        with: { name: status, path: STATUS.md }
